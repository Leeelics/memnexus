name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-
    
    - name: Install dependencies
      run: uv sync --all-extras --dev
    
    - name: Lint with ruff
      run: |
        uv run ruff check src/memnexus
        uv run ruff format --check src/memnexus
    
    - name: Type check with mypy
      run: uv run mypy src/memnexus
    
    - name: Test with pytest
      run: uv run pytest tests/ -v --tb=short

  check-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Build package
      run: uv build
    
    - name: Check package
      run: |
        uv run twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  check-docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation
      run: |
        test -f README.md
        test -f CHANGELOG.md
        test -f LICENSE
        test -f pyproject.toml
    
    - name: Check version consistency
      run: |
        PYPROJECT_VERSION=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
        INIT_VERSION=$(grep '__version__' src/memnexus/__init__.py | head -1 | cut -d'"' -f2)
        echo "pyproject.toml: $PYPROJECT_VERSION"
        echo "__init__.py: $INIT_VERSION"
        if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
          echo "Version mismatch!"
          exit 1
        fi
        echo "✓ Versions are consistent"
