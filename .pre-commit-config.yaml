# Pre-commit hooks for MemNexus
# Install: uvx pre-commit install
# Run manually: uvx pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: format-check
        name: Format Check
        entry: make format-check
        language: system
        pass_filenames: false
        always_run: true
        
      - id: lint
        name: Lint Check
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true
        
      - id: test
        name: Run Tests
        entry: make test-ci
        language: system
        pass_filenames: false
        always_run: true
        
      - id: build-check
        name: Build Check
        entry: make build-check
        language: system
        pass_filenames: false
        always_run: true
